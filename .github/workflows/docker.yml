name: Build & Push images

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      pull_request_number:
        required: true
        type: number
      image_tag:
        required: true
        type: string
      k8s_version:
        required: true
        type: string
      k8s_image:
        required: true
        type: string
  push:
    branches:
      - 'main'
    tags:
      - '*'

permissions:
  packages: write

jobs:
  sk8l-ui-dev-img:
    runs-on: ubuntu-latest
    name: sk8l-ui:dev-${{ inputs.image_tag }} (${{ matrix.platform }})
    if: ${{ github.event_name == 'workflow_call' && inputs.image_tag || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}
    # Each platform builds natively in parallel(Avoid slow QEMU emulation)
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0
      - name: Login to ghcr.io
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Build per-platform and push as a digest (not a full tag). The manifests is merged in next job
      - name: Build and push dev/pr version to ghcr.io
        id: build
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: Dockerfile
          # Scoped per-platform and per-job to avoid cache eviction across jobs
          cache-from: type=gha,scope=sk8l-ui-dev-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=sk8l-ui-dev-${{ matrix.platform }}
          platforms: ${{ matrix.platform }}
          # Push digest only. The final multi-arch manifest is created in merge job below
          push: true
          outputs: type=image,name=${{ vars.GHCR_SK8L_UI_IMAGE_NAME }},push-by-digest=true,name-canonical=true
      # Save digest per platform for the merge job
      - name: Export digest
        run: |
          mkdir -p /tmp/digests/sk8l-ui-dev
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/sk8l-ui-dev/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-sk8l-ui-dev-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/sk8l-ui-dev/*
          retention-days: 1
  # Merge per-platform digests into a single multi-arch manifest
  sk8l-ui-dev-img-merge:
    runs-on: ubuntu-latest
    needs: [sk8l-ui-dev-img]
    if: ${{ github.event_name == 'workflow_call' && inputs.image_tag || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/sk8l-ui-dev
          pattern: digests-sk8l-ui-dev-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0
      - name: Login to ghcr.io
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests/sk8l-ui-dev
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '{"tags":["${{ vars.GHCR_SK8L_UI_IMAGE_NAME }}:dev-${{ inputs.image_tag }}","${{ vars.GHCR_SK8L_UI_IMAGE_NAME }}:dev-${{ inputs.pull_request_number }}"]}') \
            $(printf '${{ vars.GHCR_SK8L_UI_IMAGE_NAME }}@sha256:%s ' *)
  sk8l-ui-dev-main-img:
    runs-on: ubuntu-latest
    name: sk8l-ui:dev-main@${{ github.sha }} (${{ matrix.platform }})
    if: github.ref == 'refs/heads/main'
    # Build matrix. Each platform builds natively in parallel(avoid slow QEMU emulation)
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0
      - name: Login to ghcr.io
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push dev/main version
        id: build
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: Dockerfile
          # Scoped per-platform and per-job to avoid cache eviction across jobs
          cache-from: type=gha,scope=sk8l-ui-dev-main-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=sk8l-ui-dev-main-${{ matrix.platform }}
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ vars.GHCR_SK8L_UI_IMAGE_NAME }},push-by-digest=true,name-canonical=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests/sk8l-ui-dev-main
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/sk8l-ui-dev-main/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-sk8l-ui-dev-main-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/sk8l-ui-dev-main/*
          retention-days: 1
  sk8l-ui-dev-main-img-merge:
    runs-on: ubuntu-latest
    needs: [sk8l-ui-dev-main-img]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/sk8l-ui-dev-main
          pattern: digests-sk8l-ui-dev-main-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0
      - name: Login to ghcr.io
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests/sk8l-ui-dev-main
        run: |
          docker buildx imagetools create \
            -t ${{ vars.GHCR_SK8L_UI_IMAGE_NAME }}:dev \
            -t ${{ vars.GHCR_SK8L_UI_IMAGE_NAME }}:dev-${{ github.sha }} \
            $(printf '${{ vars.GHCR_SK8L_UI_IMAGE_NAME }}@sha256:%s ' *)
  sk8l-ui-pre-main-img:
    runs-on: ubuntu-latest
    name: sk8l-ui:pre-main@${{ github.sha }} (${{ matrix.platform }})
    if: github.ref == 'refs/heads/main'
    # Each platform builds natively in parallel(Avoid slow QEMU emulation)
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0
      - name: Login to ghcr.io
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push pre-main
        id: build
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: production.dockerfile
          # Scoped per-platform and per-job to avoid cache eviction across jobs
          cache-from: type=gha,scope=sk8l-ui-pre-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=sk8l-ui-pre-${{ matrix.platform }}
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ vars.GHCR_SK8L_UI_IMAGE_NAME }},push-by-digest=true,name-canonical=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests/sk8l-ui-pre-main
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/sk8l-ui-pre-main/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-sk8l-ui-pre-main-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/sk8l-ui-pre-main/*
          retention-days: 1
  sk8l-ui-pre-main-img-merge:
    runs-on: ubuntu-latest
    needs: [sk8l-ui-pre-main-img]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/sk8l-ui-pre-main
          pattern: digests-sk8l-ui-pre-main-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0
      - name: Login to ghcr.io
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests/sk8l-ui-pre-main
        run: |
          docker buildx imagetools create \
            -t ${{ vars.GHCR_SK8L_UI_IMAGE_NAME }}:pre \
            -t ${{ vars.GHCR_SK8L_UI_IMAGE_NAME }}:pre-${{ github.sha }} \
            $(printf '${{ vars.GHCR_SK8L_UI_IMAGE_NAME }}@sha256:%s ' *)
  sk8l-ui-pre-pr-img:
    runs-on: ubuntu-latest
    name: sk8l-ui:pre-${{ inputs.image_tag }} (${{ matrix.platform }})
    if: ${{ github.event_name == 'workflow_call' && inputs.image_tag || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}
    # Each platform builds natively in parallel(Avoid slow QEMU emulation)
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0
      - name: Login to ghcr.io
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push pre-${{ inputs.pull_request_number }} version
        id: build
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: production.dockerfile
          # Scoped per-platform and per-job to avoid cache eviction across jobs
          cache-from: type=gha,scope=sk8l-ui-pre-pr-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=sk8l-ui-pre-pr-${{ matrix.platform }}
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ vars.GHCR_SK8L_UI_IMAGE_NAME }},push-by-digest=true,name-canonical=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests/sk8l-ui-pre-pr
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/sk8l-ui-pre-pr/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-sk8l-ui-pre-pr-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/sk8l-ui-pre-pr/*
          retention-days: 1
  sk8l-ui-pre-pr-img-merge:
    runs-on: ubuntu-latest
    needs: [sk8l-ui-pre-pr-img]
    if: ${{ github.event_name == 'workflow_call' && inputs.image_tag || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/sk8l-ui-pre-pr
          pattern: digests-sk8l-ui-pre-pr-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0
      - name: Login to ghcr.io
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests/sk8l-ui-pre-pr
        run: |
          docker buildx imagetools create \
            -t ${{ vars.GHCR_SK8L_UI_IMAGE_NAME }}:pre-${{ inputs.image_tag }} \
            -t ${{ vars.GHCR_SK8L_UI_IMAGE_NAME }}:pre-${{ inputs.pull_request_number }} \
            $(printf '${{ vars.GHCR_SK8L_UI_IMAGE_NAME }}@sha256:%s ' *)
  sk8l-ui-production-img:
    runs-on: ubuntu-latest
    name: sk8l-ui:production (${{ matrix.platform }})
    if: startsWith(github.ref, 'refs/tags/')
    # Each platform builds natively in parallel(Avoid slow QEMU emulation)
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
      - name: Checkout - set env
        run: echo "IMAGE_TAG=$(make version)" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0
      - name: Login to Docker Hub
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push release version
        id: build
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: production.dockerfile
          # Scoped per-platform and per-job to avoid cache eviction across jobs
          cache-from: type=gha,scope=sk8l-ui-production-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=sk8l-ui-production-${{ matrix.platform }}
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ vars.DOCKERHUB_SK8L_UI_IMAGE_NAME }},push-by-digest=true,name-canonical=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests/sk8l-ui-production
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/sk8l-ui-production/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-sk8l-ui-production-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/sk8l-ui-production/*
          retention-days: 1
  sk8l-ui-production-img-merge:
    runs-on: ubuntu-latest
    needs: [sk8l-ui-production-img]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout - set env
        run: echo "IMAGE_TAG=$(make version)" >> $GITHUB_ENV
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/sk8l-ui-production
          pattern: digests-sk8l-ui-production-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0
      - name: Login to Docker Hub
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests/sk8l-ui-production
        run: |
          docker buildx imagetools create \
            -t ${{ vars.DOCKERHUB_SK8L_UI_IMAGE_NAME }}:latest \
            -t ${{ vars.DOCKERHUB_SK8L_UI_IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            $(printf '${{ vars.DOCKERHUB_SK8L_UI_IMAGE_NAME }}@sha256:%s ' *)
  sk8l-ui-test-img:
    runs-on: ubuntu-latest
    name: sk8l-ui:ui-test-${{ inputs.image_tag }}
    needs: [sk8l-ui-dev-img-merge]
    if: ${{ github.event_name == 'workflow_call' && inputs.image_tag || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Checkout - set env
        run: echo "IMAGE_TAG=$(make version)" >> $GITHUB_ENV
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@18ce135bb5112fa8ce4ed6c17ab05699d7f3a5e0 # v3.11.0
      - name: Login to ghcr.io
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ui-test version ${{ inputs.image_tag }}
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          file: Dockerfile.test
          # Scoped per-platform and per-job to avoid cache eviction across jobs
          cache-from: type=gha,scope=sk8l-ui-test
          cache-to: type=gha,mode=max,scope=sk8l-ui-test
          # Test image is amd64-only.
          platforms: linux/amd64
          build-args: |
            UI_TEST_IMAGE_TAG=dev-${{ inputs.image_tag }}
          push: true
          tags: |
            ${{ vars.GHCR_SK8L_UI_IMAGE_NAME }}:ui-test
            ${{ vars.GHCR_SK8L_UI_IMAGE_NAME }}:ui-test-${{ github.sha }}
            ${{ vars.GHCR_SK8L_UI_IMAGE_NAME }}:ui-test-${{ inputs.image_tag }}
            ${{ vars.GHCR_SK8L_UI_IMAGE_NAME }}:ui-test-${{ inputs.pull_request_number }}
